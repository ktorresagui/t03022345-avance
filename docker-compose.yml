version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: volaris-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: volaris
    volumes:
      - mongodb_data:/data/db
    networks:
      - volaris-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volaris-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/volaris
      NODE_ENV: production
    ports:
    -"3000:3000"
    volumes:
      - app_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - volaris-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: volaris-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - volaris-net

volumes:
  mongodb_data:
  app_logs:

networks:
  volaris-net:
    driver: bridge
